<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otel Rezervasyon Formu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }

        .rezervasyon-kapsayici {
            background: white;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .form-grubu {
            margin-bottom: 1.2rem;
        }

        .form-grubu label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #34495e;
            font-size: 0.95rem;
        }

        .form-grubu input,
        .form-grubu select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-grubu input:focus,
        .form-grubu select:focus {
            border-color: #3498db;
            outline: none;
        }

        .btn-gonder {
            width: 100%;
            padding: 1rem;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.3s;
        }

        .btn-gonder:hover {
            background-color: #2ecc71;
        }

        .ikili-grup {
            display: flex;
            gap: 1rem;
        }

        .ikili-grup .form-grubu {
            flex: 1;
        }
    </style>
</head>

<body>

    <div class="rezervasyon-kapsayici">
        <h2>Rezervasyon Formu</h2>

        <form id="detayliRezervasyonFormu">
            <div class="ikili-grup">
                <div class="form-grubu">
                    <label for="isim">Adınız:</label>
                    <input type="text" id="isim" placeholder="Adınız" required>
                </div>
                <div class="form-grubu">
                    <label for="soyisim">Soyadınız:</label>
                    <input type="text" id="soyisim" placeholder="Soyadınız" required>
                </div>
            </div>

            <div class="form-grubu">
                <label for="tcKimlik">TC Kimlik Numarası:</label>
                <input type="text" id="tcKimlik" maxlength="11" pattern="\d{11}" placeholder="11 Haneli TC Kimlik No"
                    required>
            </div>

            <div class="form-grubu">
                <label for="eposta">E-Posta Adresi:</label>
                <input type="email" id="eposta" placeholder="ornek@mail.com" required>
            </div>

            <div class="form-grubu">
                <label for="telefon">Telefon Numarası:</label>
                <input type="tel" id="telefon" placeholder="05XX XXX XX XX" required>
            </div>

            <div class="form-grubu">
                <label for="odaTipiSecim">İstediğiniz Oda Tipi:</label>
                <select id="odaTipiSecim" required>
                    <option value="">Lütfen Oda Tipi Seçiniz</option>
                </select>
            </div>

            <div class="form-grubu">
                <label for="kisiSayisi">Kişi Sayısı:</label>
                <input type="number" id="kisiSayisi" min="1" value="1" required>
            </div>

            <div class="ikili-grup">
                <div class="form-grubu">
                    <label for="girisTarihi">Giriş Tarihi:</label>
                    <input type="date" id="girisTarihi" required>
                </div>
                <div class="form-grubu">
                    <label for="cikisTarihi">Çıkış Tarihi:</label>
                    <input type="date" id="cikisTarihi" required>
                </div>
            </div>

            <button type="submit" class="btn-gonder">Rezervasyonu Tamamla</button>
        </form>
    </div>

    <script src="rezervasyon.js"></script>
</body>

</html>
