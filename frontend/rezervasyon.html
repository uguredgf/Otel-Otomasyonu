<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervasyon Yap</title>
    <link rel="stylesheet" href="stil.css">
    <style>
        .form-kapsayici {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 2rem auto;
        }

        .form-grubu {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-grubu input {
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .gonder-butonu {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        .tarih-grubu {
            display: flex;
            gap: 1rem;
        }

        .tarih-grubu .form-grubu {
            flex: 1;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">Otel Otomasyon Projesi</div>
        <nav>
            <ul>
                <li><a href="index.html">Ana Sayfa</a></li>
                <li><a href="index.html">Odalar</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-kapsayici">
            <h2 id="seciliOdaBasligi">Oda Rezervasyonu</h2>
            <p>Lütfen rezervasyon işlemini tamamlamak için bilgilerinizi giriniz.</p>

            <form id="detayliRezervasyonFormu">
                <div class="form-grubu">
                    <label for="isim">Adınız:</label>
                    <input type="text" id="isim" required>
                </div>
                <div class="form-grubu">
                    <label for="soyisim">Soyadınız:</label>
                    <input type="text" id="soyisim" required>
                </div>
                <div class="form-grubu">
                    <label for="telefon">Telefon Numaranız:</label>
                    <input type="tel" id="telefon" required>
                </div>

                <!-- YENİ EKLENEN KİŞİ SAYISI ALANI -->
                <div class="form-grubu">
                    <label for="kisiSayisi">Kişi Sayısı:</label>
                    <input type="number" id="kisiSayisi" min="1" max="5" value="1" required>
                </div>

                <div class="tarih-grubu">
                    <div class="form-grubu">
                        <label for="girisTarihi">Giriş Tarihi:</label>
                        <input type="date" id="girisTarihi" required>
                    </div>
                    <div class="form-grubu">
                        <label for="cikisTarihi">Çıkış Tarihi:</label>
                        <input type="date" id="cikisTarihi" required>
                    </div>
                </div>

                <button type="submit" class="gonder-butonu">Rezervasyonu Tamamla</button>
            </form>
        </div>

        <button type="submit" class="gonder-butonu">Rezervasyonu Tamamla</button>
        </form>
        </div>
    </main>

    <script src="rezervasyon.js"></script>
</body>

</html>
