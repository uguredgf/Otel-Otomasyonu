<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Panosu - Oda Durumları</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        .oda-kutu {
            background-color: white;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .oda-kutu:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .oda-bos {
            border-top: 5px solid #27ae60;
        }

        .oda-bos p:last-child {
            color: #27ae60;
        }

        .oda-dolu {
            border-top: 5px solid #e74c3c;
        }

        .oda-dolu p:last-child {
            color: #e74c3c;
        }

        .oda-temizlik {
            border-top: 5px solid #f39c12 !important;
        }

        .oda-temizlik p:last-child {
            color: #f39c12 !important;
        }
    </style>
</head>

<body>
    <div class="yonetici-kapsayici">
        <aside class="yan-menu">
            <div class="logo">Otel Yönetim</div>
            <nav>
                <ul>
                    <li><a href="admin.html">Pano</a></li>
                    <li><a href="admin-rezervasyonlar.html">Rezervasyonlar</a></li>
                    <li><a href="admin-odalar.html" class="aktif">Oda Durumları</a></li>
                    <li><a href="admin-misafirler.html">Misafirler</a></li>
                    <li><a href="admin-islemler.html">İşlemler ve Fatura</a></li>
                    <li><a href="admin-ayarlar.html">Ayarlar</a></li>
                </ul>
            </nav>
        </aside>

        <main class="ana-icerik">
            <header class="ust-bilgi">
                <h1>Oda Durumları ve Kat Planı</h1>
                <div class="kullanici-bilgisi">Oturum Açık</div>
            </header>

            <div
                style="background: white; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; margin-top: 1.5rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 1rem;">
                <label for="durumFiltresi" style="font-weight: bold; color: #2c3e50; font-size: 1.1rem;">Oda Durumuna
                    Göre Filtrele:</label>
                <select id="durumFiltresi"
                    style="padding: 0.6rem; border-radius: 4px; border: 1px solid #bdc3c7; font-size: 1rem; min-width: 250px; cursor: pointer;">
                    <option value="hepsi">Tüm Odaları Göster</option>
                    <option value="oda-bos">Sadece Boş (Müsait) Odalar</option>
                    <option value="oda-dolu">Sadece Dolu Odalar</option>
                    <option value="oda-temizlik">Sadece Temizlikte Olanlar</option>
                </select>
            </div>

            <section id="adminOdaListesi" style="width: 100%;">
            </section>
        </main>
    </div>

    <script src="admin-odalar.js"></script>
    <script src="admin-yetki.js"></script>
</body>

</html>
