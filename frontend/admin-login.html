<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otel Yönetim - Giriş</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        .login-kapsayici {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c3e50;
        }

        .login-kutu {
            background: white;
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-kutu h2 {
            margin-bottom: 2rem;
            color: #2c3e50;
        }

        .form-grubu {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-grubu label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-grubu input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .giris-butonu {
            width: 100%;
            padding: 1rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .giris-butonu:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>
    <div class="login-kapsayici">
        <div class="login-kutu">
            <div class="logo" style="color: #2c3e50; font-size: 24px; font-weight: bold; margin-bottom: 1rem;">OTEL
                YÖNETİM</div>
            <h2>Sisteme Giriş</h2>
            <form id="loginFormu">
                <div class="form-grubu">
                    <label>Kullanıcı Adı:</label>
                    <input type="text" id="kullaniciAdi" placeholder="admin veya resepsiyon" required>
                </div>
                <div class="form-grubu">
                    <label>Şifre:</label>
                    <input type="password" id="sifre" required>
                </div>
                <button type="submit" class="giris-butonu">Giriş Yap</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById("loginFormu").addEventListener("submit", (e) => {
            e.preventDefault();
            const user = document.getElementById("kullaniciAdi").value;
            const pass = document.getElementById("sifre").value;

            if (user === "admin" && pass === "123") {
                localStorage.setItem("kullaniciRolu", "admin");
                window.location.href = "admin.html";
            } else if (user === "resepsiyon" && pass === "456") {
                localStorage.setItem("kullaniciRolu", "resepsiyon");
                window.location.href = "admin.html";
            } else {
                alert("Hatalı kullanıcı adı veya şifre!");
            }
        });
    </script>
</body>

</html>
